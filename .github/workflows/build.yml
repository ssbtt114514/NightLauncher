name: Build APK

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      variant:
        required: true
        type: string
    secrets:
      KEY_PASSWORD:
        required: false
      STORE_PASSWORD:
        required: false
      OAUTH_CLIENT_ID:
        required: false
      CURSEFORGE_API_KEY:
        required: false

jobs:
  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 含 JRE 的全架构 + 各具体架构；无 JRE 版本只构建具体架构（不构建 all-nojre）
        include:
          - arch: "all"
            nojre: false
          - arch: "arm"
            nojre: false
          - arch: "arm64"
            nojre: false
          - arch: "x86"
            nojre: false
          - arch: "x86_64"
            nojre: false
          - arch: "arm"
            nojre: true
          - arch: "arm64"
            nojre: true
          - arch: "x86"
            nojre: true
          - arch: "x86_64"
            nojre: true
      fail-fast: false

    env:
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          add-job-summary: "on-failure"

      - name: Build APK for ${{ matrix.arch }}${{ matrix.nojre == true && '-nojre' || '' }}
        env:
          ARCH_ARG: ${{ matrix.arch }}${{ matrix.nojre == true && '-nojre' || '' }}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assemble${{ inputs.variant }} -Darch="$ARCH_ARG"

      - name: Upload Release APK for ${{ matrix.arch }}${{ matrix.nojre == true && '-nojre' || '' }}
        if: inputs.variant == 'Release'
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: release apk (${{ matrix.arch }}${{ matrix.nojre == true && '-nojre' || '' }})
          path: ZalithLauncher/build/outputs/apk/release/*.apk

      - name: Upload Release Mapping for ${{ matrix.arch }}${{ matrix.nojre == true && '-nojre' || '' }}
        if: inputs.variant == 'Release'
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: mapping (${{ matrix.arch }}${{ matrix.nojre == true && '-nojre' || '' }})
          path: ZalithLauncher/build/outputs/mapping/release/mapping.txt

      - name: Upload Debug APK for ${{ matrix.arch }}${{ matrix.nojre == true && '-nojre' || '' }}
        if: inputs.variant == 'Debug'
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: debug apk (${{ matrix.arch }}${{ matrix.nojre == true && '-nojre' || '' }})
          path: ZalithLauncher/build/outputs/apk/debug/*.apk
